# H2 In-Memory Database – thay thế PostgreSQL khi chạy test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# File Upload Config cho test
app.upload.dir=test-uploads
app.upload.max-size-bytes=10485760
app.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
app.upload.allowed-extensions=jpg,jpeg,png,gif,webp,pdf,txt,doc,docx,xls,xlsx

# Tắt banner và logging dư thừa khi test
spring.main.banner-mode=off
logging.level.com.filesecurity=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

spring.jackson.serialization.write-dates-as-timestamps=false
